<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@2.51.5/dist/full.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md">
  <div class="text-center mb-6">
    <img src="B13-A5-Github-Issue-Tracker-main/assets/github-logo.png" alt="Logo" class="mx-auto w-20 h-20">
    <h1 class="text-2xl text-black font-bold mt-4">GitHub Issues Tracker</h1>
    <p class="text-gray-500">Sign in to manage your issues</p>
  </div>

  <form id="loginForm" class="flex flex-col gap-4">

    <div class="flex flex-col">
        <label for="username" class="font-bold text-gray-700 mb-1">Username</label>
      <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full bg-white">
      <span class="text-blue-800 text-sm mt-1">Default: admin</span>
    </div>

 
    <div class="flex flex-col">
      <label for="password" class="font-bold text-gray-700 mb-1">Password</label>
      <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full bg-white">
      <span class="text-blue-800 text-sm mt-1">Default: admin123</span>
    </div>

    <button type="submit" class="btn w-full bg-blue-600 hover:bg-blue-900 border-none text-white mt-2">Sign In</button>
  </form>
 

  <div class="flex items-center my-4">
    <hr class="flex-grow border-t border-gray-300">
    <span class="mx-2 text-gray-400 text-sm">OR</span>
    <hr class="flex-grow border-t border-gray-300">
  </div>


  <div class="bg-gray-100 p-4 rounded text-center text-sm text-gray-700">
    <p class="font-semibold">Demo Credentials:</p>
    <p>Username: <span class="font-medium">admin</span></p>
    <p>Password: <span class="font-medium">admin123</span></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
